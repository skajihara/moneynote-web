spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  mail:
    host: localhost
    port: 1025
  ai:
    anthropic:
      api-key: ${CLAUDE_API_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000      # 15分（ミリ秒）
    refresh-token-expiration: 604800000  # 7日（ミリ秒）
