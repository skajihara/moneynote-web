spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # セキュリティ: 本番で意図しないスキーマ変更を防ぐため validate に変更。スキーマ変更は Flyway で管理する
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
  mail:
    host: mailhog
    port: 1025
  ai:
    anthropic:
      api-key: ${CLAUDE_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 1000

ai:
  # デフォルトは本番想定（Claude API を使用する）。開発環境は application-dev.yml で true に上書きする
  mock: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    # セキュリティ: 本番環境では Swagger UI を無効化する。dev profile で上書きして有効化する
    enabled: false
  api-docs:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000      # 15分（ミリ秒）
    refresh-token-expiration: 604800000  # 7日（ミリ秒）
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  cookie:
    # セキュリティ: 本番環境では COOKIE_SECURE=true に設定すること。開発環境(HTTP)では false のまま使用する
    secure: ${COOKIE_SECURE:false}
  security:
    hsts:
      # セキュリティ: HSTS は HTTPS 本番環境でのみ有効化する。application-env1.yml / application-env2.yml で true に設定する
      enabled: false
  mail:
    admin-address: ${ADMIN_EMAIL:admin@example.com}
    from: ${MAIL_FROM:noreply@localhost}

management:
  endpoints:
    web:
      exposure:
        # セキュリティ: ALB ヘルスチェック用に health のみ公開する
        include: health
      base-path: /actuator
  endpoint:
    health:
      # セキュリティ: DB・Redis 等の内部情報を外部に漏らさない
      show-details: never
  server:
    port: 8080
