# ─────────────────────────────────────────────────────────────────────────────
# 本番環境設定 (spring.profiles.active=prod)
# 開発環境との差分のみ記載する。共通設定は application.yml を参照。
# ─────────────────────────────────────────────────────────────────────────────

spring:
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

ai:
  mock: false  # 本番環境では Claude API を使用する

app:
  cookie:
    # セキュリティ: 本番環境は HTTPS のため Secure フラグを強制する
    secure: true
  security:
    hsts:
      # セキュリティ: 本番環境では HSTS を有効化して HTTPS を強制する（max-age=1年）
      enabled: true

logging:
  level:
    root: WARN
    com.example.moneynote: INFO
