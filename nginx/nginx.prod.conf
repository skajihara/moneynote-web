# ─────────────────────────────────────────────────────────────────────────────
# nginx リバースプロキシ設定（本番環境用）
# ・ALB が HTTPS 終端するため nginx は HTTP のみ受け付ける
# ・ホスト側ポート 8080 → コンテナポート 80 でバインドされる
# ・/api/* / /actuator/* → backend:8080
# ・それ以外              → frontend:3000
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ALB が付与した X-Forwarded-* ヘッダーをそのまま Spring Boot に渡す
    proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Host              $host;

    # ── バックエンド API ──────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080;
    }

    # ── Actuator（ALB ヘルスチェック用）──────────────────────
    location /actuator/ {
        proxy_pass http://backend:8080;
    }

    # ── フロントエンド（その他すべて）────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
