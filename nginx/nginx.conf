# ─────────────────────────────────────────────────────────────────────────────
# nginx リバースプロキシ設定
# ・HTTPS 終端（mkcert ローカル証明書）
# ・/api/* / /swagger-ui* / /v3/api-docs* → backend:8080
# ・それ以外 → frontend:3000
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # セキュリティ: X-Forwarded-For をクライアント直 IP で上書きする（ヘッダー偽装対策）
    # $remote_addr は nginx への接続元 IP（= 実クライアント IP）
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host              $host;

    # ── バックエンド API ──────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080;
    }

    # ── Swagger UI（dev profile のみ有効化されている）────────
    location /swagger-ui {
        proxy_pass http://backend:8080;
    }
    location /v3/api-docs {
        proxy_pass http://backend:8080;
    }

    # ── フロントエンド（その他すべて）────────────────────────
    location / {
        proxy_pass http://frontend:3000;

        # Next.js HMR（Hot Module Replacement）用 WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}
