# ─────────────────────────────────────────────────────────────────────────────
# 環境2用 Docker Compose（main ブランチ）
# 起動前に scripts/secrets-fetch.sh env2 を実行して .env.env2 を生成すること
# 起動コマンド: docker-compose -f docker-compose.env2.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    image: nginx:alpine
    ports:
      # ALB がポート 8080 にトラフィックを転送するためホスト側を 8080 にバインドする
      - "8080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moneynote
      POSTGRES_USER: moneynote
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.env2
    environment:
      SPRING_PROFILES_ACTIVE: env2
    healthcheck:
      # eclipse-temurin:24-jre-alpine には curl がないため wget を使用する
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  frontend:
    build: ./frontend
    command: node_modules/.bin/next start -H 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
