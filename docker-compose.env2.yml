# ─────────────────────────────────────────────────────────────────────────────
# 環境2用 Docker Compose（main ブランチ）
# Step 21以降: DB は RDS（RDS-ka-moneynote-02）・Redis は ElastiCache（ELC-ka-moneynote-02）を使用
# 起動前に scripts/secrets-fetch.sh env2 を実行して .env.env2 を生成すること
# 起動コマンド: docker-compose -f docker-compose.env2.yml --env-file .env.env2 up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    image: nginx:alpine
    ports:
      # ALB がポート 8080 にトラフィックを転送するためホスト側を 8080 にバインドする
      - "8080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/ecr-ka-moneynote-backend:latest
    env_file:
      - .env.env2
    environment:
      SPRING_PROFILES_ACTIVE: env2
    healthcheck:
      # eclipse-temurin:24-jre-alpine には curl がないため wget を使用する
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  frontend:
    image: ${ECR_REGISTRY}/ecr-ka-moneynote-frontend:latest
    environment:
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
