services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moneynote
      POSTGRES_USER: moneynote
      POSTGRES_PASSWORD: moneynote
    ports:
      # 開発ツール（DBクライアント等）用にローカルホストのみに公開する
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      # 開発ツール（redis-cli 等）用にローカルホストのみに公開する
      - "127.0.0.1:6379:6379"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"

  backend:
    build: ./backend
    # ポートはホストに公開しない（nginx 経由でのみアクセス）
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      AI_MOCK: "true"

  frontend:
    build: ./frontend
    # ポートはホストに公開しない（nginx 経由でのみアクセス）
    depends_on:
      - backend

volumes:
  postgres_data:
