name: CI/CD

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'デプロイ対象ブランチ (develop=env1, main=env2)'
        required: true
        default: 'develop'
        type: choice
        options:
          - develop
          - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  build-and-push:
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-backend:latest \
                       -t ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-backend:sha-${{ github.sha }} \
                       ./backend
          docker push ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-backend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-backend:sha-${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-frontend:latest \
                       -t ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-frontend:sha-${{ github.sha }} \
                       ./frontend
          docker push ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-frontend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-frontend:sha-${{ github.sha }}

  deploy:
    needs: [build-and-push]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Set deploy variables
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "env=env1" >> "$GITHUB_OUTPUT"
            echo "branch=develop" >> "$GITHUB_OUTPUT"
            echo "instance_id=${{ secrets.EC2_INSTANCE_ID_ENV1 }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=env2" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "instance_id=${{ secrets.EC2_INSTANCE_ID_ENV2 }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        id: ssm-send
        env:
          DEPLOY_ENV: ${{ steps.vars.outputs.env }}
          DEPLOY_BRANCH: ${{ steps.vars.outputs.branch }}
          DEPLOY_INSTANCE: ${{ steps.vars.outputs.instance_id }}
        run: |
          PARAMS=$(jq -cn \
            --arg env "$DEPLOY_ENV" \
            --arg branch "$DEPLOY_BRANCH" \
            '{commands: [
              "set -e",
              "export HOME=/root",
              "mkdir -p /root/.ssh && chmod 700 /root/.ssh",
              "GITHUB_KEY_B64=$(aws secretsmanager get-secret-value --region ap-northeast-1 --secret-id moneynote/github-deploy-key --query SecretString --output text | python3 -c \"import sys,json; print(json.load(sys.stdin)['\''private_key_b64'\''])\")",
              "printf \"%s\" \"$GITHUB_KEY_B64\" | base64 -d > /root/.ssh/github_deploy",
              "chmod 600 /root/.ssh/github_deploy",
              "printf \"Host github.com\\n  IdentityFile /root/.ssh/github_deploy\\n  StrictHostKeyChecking no\\n\" > /root/.ssh/config",
              "chmod 600 /root/.ssh/config",
              "git config --global --add safe.directory /home/ssm-user/moneynote-web",
              "if [ ! -d /home/ssm-user/moneynote-web/.git ]; then git clone git@github.com:skajihara/moneynote-web.git /home/ssm-user/moneynote-web; fi",
              "cd /home/ssm-user/moneynote-web",
              "git remote set-url origin git@github.com:skajihara/moneynote-web.git",
              ("git fetch origin " + $branch),
              ("git checkout " + $branch),
              ("git reset --hard origin/" + $branch),
              ("bash ./scripts/secrets-fetch.sh " + $env),
              ("ECR_REGISTRY=$(grep ECR_REGISTRY .env." + $env + " | cut -d= -f2)"),
              "aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              ("docker compose -f docker-compose." + $env + ".yml --env-file .env." + $env + " pull"),
              ("docker compose -f docker-compose." + $env + ".yml --env-file .env." + $env + " up -d --force-recreate"),
              "rm -f /root/.ssh/github_deploy /root/.ssh/config",
              "curl -f --retry 30 --retry-delay 10 --retry-all-errors http://localhost:8080/actuator/health"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$DEPLOY_INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to complete
        env:
          DEPLOY_INSTANCE: ${{ steps.vars.outputs.instance_id }}
        run: |
          TIMEOUT=600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm-send.outputs.command_id }}" \
              --instance-id "$DEPLOY_INSTANCE" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "SSM status: $STATUS (${ELAPSED}s elapsed)"
            case "$STATUS" in
              Success|Failed|TimedOut|Cancelled|DeliveryTimedOut) break ;;
            esac
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

      - name: Check SSM command result
        env:
          DEPLOY_INSTANCE: ${{ steps.vars.outputs.instance_id }}
        run: |
          INVOCATION=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm-send.outputs.command_id }}" \
            --instance-id "$DEPLOY_INSTANCE")

          STATUS=$(echo "$INVOCATION" | jq -r '.Status')
          echo "=== Deploy status: $STATUS ==="

          echo "--- stdout ---"
          echo "$INVOCATION" | jq -r '.StandardOutputContent'

          echo "--- stderr ---"
          echo "$INVOCATION" | jq -r '.StandardErrorContent'

          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi
