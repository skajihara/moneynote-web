name: CI/CD

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  build-and-push:
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-backend:latest \
                       -t ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-backend:sha-${{ github.sha }} \
                       ./backend
          docker push ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-backend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-backend:sha-${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-frontend:latest \
                       -t ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-frontend:sha-${{ github.sha }} \
                       ./frontend
          docker push ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-frontend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/ecr-ka-moneynote-frontend:sha-${{ github.sha }}

  deploy:
    needs: [build-and-push]
    # Step 19 で main (env2) も対象にする場合:
    # if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Set deploy variables
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "env=env1" >> "$GITHUB_OUTPUT"
            echo "branch=develop" >> "$GITHUB_OUTPUT"
            echo "instance_id=${{ secrets.EC2_INSTANCE_ID_ENV1 }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=env2" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "instance_id=${{ secrets.EC2_INSTANCE_ID_ENV2 }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        id: ssm-send
        env:
          DEPLOY_ENV: ${{ steps.vars.outputs.env }}
          DEPLOY_BRANCH: ${{ steps.vars.outputs.branch }}
          DEPLOY_INSTANCE: ${{ steps.vars.outputs.instance_id }}
        run: |
          PARAMS=$(jq -cn \
            --arg env "$DEPLOY_ENV" \
            --arg branch "$DEPLOY_BRANCH" \
            '{commands: [
              "cd /home/ssm-user/moneynote-web",
              ("git fetch origin " + $branch),
              ("git checkout " + $branch),
              ("git reset --hard origin/" + $branch),
              ("./scripts/secrets-fetch.sh " + $env),
              ("ECR_REGISTRY=$(grep ECR_REGISTRY .env." + $env + " | cut -d= -f2)"),
              "aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              ("docker compose -f docker-compose." + $env + ".yml --env-file .env." + $env + " pull"),
              ("docker compose -f docker-compose." + $env + ".yml --env-file .env." + $env + " up -d"),
              "sleep 30",
              "curl -f http://localhost:8080/actuator/health"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$DEPLOY_INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to complete
        env:
          DEPLOY_INSTANCE: ${{ steps.vars.outputs.instance_id }}
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm-send.outputs.command_id }}" \
            --instance-id "$DEPLOY_INSTANCE"

      - name: Check SSM command result
        env:
          DEPLOY_INSTANCE: ${{ steps.vars.outputs.instance_id }}
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm-send.outputs.command_id }}" \
            --instance-id "$DEPLOY_INSTANCE" \
            --query "Status" \
            --output text)
          echo "Deploy status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "${{ steps.ssm-send.outputs.command_id }}" \
              --instance-id "$DEPLOY_INSTANCE" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
